spring.application.name=Movie-Library

spring.datasource.url=jdbc:mariadb://localhost:3306/movie_library
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

omdb.api.base-url=https://www.omdbapi.com
omdb.api.key=${OMDB_API_KEY}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.web.error.include-message=always
spring.web.error.include-binding-errors=always